<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 3200" width="2400" height="3200">
  <defs>
    <filter id="painted" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.015" numOctaves="3" seed="370" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.06"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
  </defs>
  
  <rect width="2400" height="3200" fill="#f0e8d8"/>
  
  <g filter="url(#painted)">
    <!-- Bottom stone - largest, wide and flat -->
    <ellipse cx="1200" cy="2500" rx="380" ry="120" fill="#8a7860" opacity="0.7"/>
    <ellipse cx="1200" cy="2500" rx="380" ry="120" fill="none" stroke="#6a5840" stroke-width="4" opacity="0.4"/>
    <ellipse cx="1170" cy="2480" rx="280" ry="70" fill="#988868" opacity="0.15"/>
    
    <!-- Second stone -->
    <ellipse cx="1200" cy="2300" rx="280" ry="100" fill="#907a62" opacity="0.7"/>
    <ellipse cx="1200" cy="2300" rx="280" ry="100" fill="none" stroke="#6a5840" stroke-width="3.5" opacity="0.4"/>
    <ellipse cx="1180" cy="2285" rx="200" ry="55" fill="#a08a70" opacity="0.15"/>
    
    <!-- Third stone - rounder -->
    <ellipse cx="1200" cy="2100" rx="220" ry="110" fill="#887058" opacity="0.7"/>
    <ellipse cx="1200" cy="2100" rx="220" ry="110" fill="none" stroke="#6a5840" stroke-width="3.5" opacity="0.4"/>
    <ellipse cx="1185" cy="2080" rx="150" ry="60" fill="#988868" opacity="0.15"/>
    
    <!-- Fourth stone -->
    <ellipse cx="1200" cy="1880" rx="170" ry="90" fill="#907a62" opacity="0.7"/>
    <ellipse cx="1200" cy="1880" rx="170" ry="90" fill="none" stroke="#6a5840" stroke-width="3" opacity="0.4"/>
    <ellipse cx="1190" cy="1865" rx="110" ry="45" fill="#a08a70" opacity="0.15"/>
    
    <!-- Fifth stone - smaller -->
    <ellipse cx="1200" cy="1690" rx="130" ry="75" fill="#887058" opacity="0.7"/>
    <ellipse cx="1200" cy="1690" rx="130" ry="75" fill="none" stroke="#6a5840" stroke-width="3" opacity="0.4"/>
    <ellipse cx="1190" cy="1678" rx="80" ry="38" fill="#988868" opacity="0.15"/>
    
    <!-- Sixth stone -->
    <ellipse cx="1200" cy="1530" rx="95" ry="60" fill="#907a62" opacity="0.7"/>
    <ellipse cx="1200" cy="1530" rx="95" ry="60" fill="none" stroke="#6a5840" stroke-width="2.5" opacity="0.4"/>
    <ellipse cx="1195" cy="1520" rx="55" ry="30" fill="#a08a70" opacity="0.15"/>
    
    <!-- Top stone - smallest, nearly round -->
    <ellipse cx="1200" cy="1400" rx="60" ry="50" fill="#887058" opacity="0.7"/>
    <ellipse cx="1200" cy="1400" rx="60" ry="50" fill="none" stroke="#6a5840" stroke-width="2.5" opacity="0.4"/>
    <ellipse cx="1195" cy="1392" rx="32" ry="22" fill="#988868" opacity="0.15"/>
  </g>
  
  <rect width="2400" height="3200" filter="url(#grain)" opacity="0.22"/>
</svg>