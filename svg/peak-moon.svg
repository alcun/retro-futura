<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 3200" width="2400" height="3200">
  <defs>
    <filter id="painted" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.012" numOctaves="3" seed="390" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.05"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
    <linearGradient id="duskSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1830"/>
      <stop offset="60%" stop-color="#2a2040"/>
      <stop offset="100%" stop-color="#3a2840"/>
    </linearGradient>
    <filter id="moonGlow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <rect width="2400" height="3200" fill="url(#duskSky)"/>
  
  <g filter="url(#painted)">
    <!-- Moon - sitting right behind the peak -->
    <circle cx="1200" cy="1100" r="320" fill="#d0c8b8" opacity="0.06" filter="url(#moonGlow)"/>
    <circle cx="1200" cy="1100" r="280" fill="#e0d8c8" opacity="0.08" filter="url(#moonGlow)"/>
    <circle cx="1200" cy="1100" r="250" fill="#e8e0d0" opacity="0.7"/>
    
    <!-- Subtle moon texture -->
    <ellipse cx="1140" cy="1040" rx="80" ry="60" fill="#d0c8b8" opacity="0.2"/>
    <ellipse cx="1280" cy="1080" rx="50" ry="55" fill="#d8d0c0" opacity="0.15"/>
    <ellipse cx="1180" cy="1150" rx="90" ry="45" fill="#d0c8b8" opacity="0.15"/>
    
    <!-- Mountain - single dramatic peak, dark silhouette -->
    <path d="M -100 2800 L 500 2400 L 800 2100 L 1000 1750 L 1150 1400 L 1200 1200 L 1250 1400 L 1400 1750 L 1600 2100 L 1900 2400 L 2500 2800 L 2500 3200 L -100 3200 Z" 
          fill="#0c0a18" opacity="0.95"/>
    
    <!-- Mountain subtle ridge detail -->
    <path d="M 800 2100 L 900 1950 L 950 2000 L 1000 1750" 
          fill="none" stroke="#181628" stroke-width="3" opacity="0.3"/>
    <path d="M 1400 1750 L 1450 2000 L 1500 1950 L 1600 2100" 
          fill="none" stroke="#181628" stroke-width="3" opacity="0.3"/>
    
    <!-- Snow cap suggestion -->
    <path d="M 1150 1400 L 1200 1200 L 1250 1400 L 1220 1350 L 1200 1380 L 1180 1350 Z" 
          fill="#2a2840" opacity="0.4"/>
  </g>
  
  <!-- Stars -->
  <circle cx="300" cy="250" r="2.5" fill="#c0b8d0" opacity="0.55"/>
  <circle cx="700" cy="400" r="2" fill="#c0b8d0" opacity="0.4"/>
  <circle cx="400" cy="600" r="1.5" fill="#c0b8d0" opacity="0.35"/>
  <circle cx="1800" cy="300" r="2.5" fill="#c0b8d0" opacity="0.5"/>
  <circle cx="2100" cy="500" r="2" fill="#c0b8d0" opacity="0.4"/>
  <circle cx="2000" cy="200" r="1.5" fill="#c0b8d0" opacity="0.35"/>
  <circle cx="600" cy="800" r="2" fill="#c0b8d0" opacity="0.3"/>
  <circle cx="1900" cy="750" r="1.5" fill="#c0b8d0" opacity="0.28"/>
  
  <rect width="2400" height="3200" filter="url(#grain)" opacity="0.18"/>
</svg>