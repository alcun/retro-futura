<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 3200" width="2400" height="3200">
  <defs>
    <radialGradient id="sunGlow" cx="50%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#f0c850" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f4ebda" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sunBody" cx="42%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#f5d465"/>
      <stop offset="40%" stop-color="#e8b840"/>
      <stop offset="100%" stop-color="#d4a030"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.05"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
    <!-- Painted edge roughness -->
    <filter id="painted" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.015" numOctaves="3" seed="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="2400" height="3200" fill="#f4ebda"/>
  <rect width="2400" height="3200" fill="url(#sunGlow)"/>
  
  <!-- Sun position: horizontally centered, upper area -->
  <!-- cx=1200 cy=1050 -->
  
