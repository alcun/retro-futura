<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 3200" width="2400" height="3200">
  <defs>
    <filter id="painted" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.015" numOctaves="3" seed="12" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="moonGlow" cx="50%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#8090b0" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a1e2e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moonFill" cx="40%" cy="38%" r="58%">
      <stop offset="0%" stop-color="#e8e4d8"/>
      <stop offset="40%" stop-color="#d5cfc0"/>
      <stop offset="100%" stop-color="#b8b0a0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.06"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
  </defs>
  
  <rect width="2400" height="3200" fill="#1a1e2e"/>
  <rect width="2400" height="3200" fill="url(#moonGlow)"/>
  
