<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 3200" width="2400" height="3200">
  <defs>
    <filter id="painted" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="turbulence" baseFrequency="0.01" numOctaves="3" seed="380" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="7" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.05"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
  </defs>
  
  <rect width="2400" height="3200" fill="#0a1420"/>
  
  <g filter="url(#painted)">
    <!-- The wave - one massive curling form -->
    <!-- Outer edge - brightest -->
    <path d="M -100 2200 C 200 2200 500 2100 800 1800 C 1000 1600 1150 1300 1250 1100 C 1350 900 1500 750 1700 800 C 1900 850 2000 1100 2050 1300 C 2100 1500 2200 1700 2500 1800" 
          fill="none" stroke="#50c0d0" stroke-width="12" opacity="0.65" stroke-linecap="round"/>
    
    <!-- Second line -->
    <path d="M -100 2300 C 200 2300 550 2180 850 1900 C 1050 1700 1200 1420 1300 1220 C 1400 1020 1530 880 1700 920 C 1870 960 1980 1180 2040 1380 C 2100 1580 2220 1780 2500 1870" 
          fill="none" stroke="#48b0c0" stroke-width="10" opacity="0.55" stroke-linecap="round"/>
    
    <!-- Third line -->
    <path d="M -100 2400 C 250 2400 600 2260 900 2000 C 1100 1800 1250 1540 1340 1350 C 1430 1160 1560 1020 1700 1050 C 1840 1080 1960 1270 2030 1470 C 2100 1670 2240 1860 2500 1940" 
          fill="none" stroke="#40a0b0" stroke-width="9" opacity="0.5" stroke-linecap="round"/>
    
    <!-- Fourth line -->
    <path d="M -100 2500 C 300 2500 650 2340 950 2100 C 1150 1900 1280 1660 1370 1480 C 1460 1300 1580 1170 1700 1190 C 1820 1210 1940 1370 2020 1560 C 2100 1750 2260 1940 2500 2010" 
          fill="none" stroke="#389098" stroke-width="8" opacity="0.45" stroke-linecap="round"/>
    
    <!-- Fifth line -->
    <path d="M -100 2600 C 350 2600 700 2420 1000 2200 C 1200 2000 1310 1780 1400 1610 C 1490 1440 1600 1320 1700 1340 C 1800 1360 1920 1480 2010 1650 C 2100 1820 2280 2010 2500 2080" 
          fill="none" stroke="#308088" stroke-width="7" opacity="0.4" stroke-linecap="round"/>
    
    <!-- Deeper lines -->
    <path d="M -100 2700 C 400 2700 750 2500 1050 2300 C 1250 2100 1340 1900 1430 1740 C 1520 1580 1620 1470 1700 1490 C 1780 1510 1900 1600 2000 1750 C 2100 1900 2300 2080 2500 2150" 
          fill="none" stroke="#287078" stroke-width="6.5" opacity="0.35" stroke-linecap="round"/>
    
    <path d="M -100 2800 C 450 2800 800 2580 1100 2400 C 1300 2200 1370 2020 1460 1870 C 1550 1720 1640 1620 1700 1640 C 1760 1660 1880 1730 1990 1860 C 2100 1990 2320 2150 2500 2220" 
          fill="none" stroke="#206068" stroke-width="6" opacity="0.3" stroke-linecap="round"/>
    
    <path d="M -100 2900 C 500 2900 850 2660 1150 2500 C 1350 2300 1400 2140 1490 2000 C 1580 1860 1660 1770 1700 1790 C 1740 1810 1860 1870 1980 1980 C 2100 2090 2340 2230 2500 2290" 
          fill="none" stroke="#185058" stroke-width="5.5" opacity="0.25" stroke-linecap="round"/>
    
    <!-- Foam at the crest - small dots and dashes -->
    <circle cx="1250" cy="1080" r="5" fill="#80e0f0" opacity="0.2"/>
    <circle cx="1280" cy="1050" r="4" fill="#80e0f0" opacity="0.18"/>
    <circle cx="1220" cy="1120" r="3.5" fill="#80e0f0" opacity="0.15"/>
    <circle cx="1310" cy="1090" r="3" fill="#80e0f0" opacity="0.15"/>
    <circle cx="1200" cy="1060" r="4" fill="#80e0f0" opacity="0.12"/>
    <circle cx="1340" cy="1120" r="3" fill="#80e0f0" opacity="0.12"/>
    <circle cx="1170" cy="1100" r="3.5" fill="#80e0f0" opacity="0.1"/>
  </g>
  
  <rect width="2400" height="3200" filter="url(#grain)" opacity="0.15"/>
</svg>