<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 3200" width="2400" height="3200">
  <defs>
    <filter id="painted" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="turbulence" baseFrequency="0.01" numOctaves="3" seed="160" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="ringGlow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
    <radialGradient id="saturnBody" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#e0c080"/>
      <stop offset="50%" stop-color="#c8a060"/>
      <stop offset="100%" stop-color="#a08040"/>
    </radialGradient>
  </defs>
  
  <rect width="2400" height="3200" fill="#06080c"/>
  
  <!-- Stars -->
  <circle cx="200" cy="200" r="2" fill="#d0c8e0" opacity="0.5"/>
  <circle cx="600" cy="100" r="1.5" fill="#d0c8e0" opacity="0.4"/>
  <circle cx="1000" cy="250" r="2.5" fill="#d0c8e0" opacity="0.55"/>
  <circle cx="1500" cy="150" r="2" fill="#d0c8e0" opacity="0.4"/>
  <circle cx="1900" cy="300" r="1.5" fill="#d0c8e0" opacity="0.35"/>
  <circle cx="2200" cy="180" r="2" fill="#d0c8e0" opacity="0.45"/>
  <circle cx="300" cy="2900" r="2" fill="#d0c8e0" opacity="0.45"/>
  <circle cx="800" cy="3050" r="1.5" fill="#d0c8e0" opacity="0.35"/>
  <circle cx="1600" cy="2950" r="2" fill="#d0c8e0" opacity="0.4"/>
  <circle cx="2100" cy="3080" r="2.5" fill="#d0c8e0" opacity="0.5"/>
  <circle cx="400" cy="500" r="1.5" fill="#d0c8e0" opacity="0.3"/>
  <circle cx="2000" cy="600" r="2" fill="#d0c8e0" opacity="0.35"/>
  <circle cx="150" cy="2500" r="1.5" fill="#d0c8e0" opacity="0.3"/>
  <circle cx="2300" cy="2600" r="2" fill="#d0c8e0" opacity="0.35"/>
  
  <g filter="url(#painted)">
    <!-- Saturn body - large, mostly off the bottom -->
    <circle cx="1200" cy="2800" r="1200" fill="url(#saturnBody)" opacity="0.85"/>
    
    <!-- Atmospheric bands -->
    <ellipse cx="1200" cy="2500" rx="1150" ry="20" fill="#b89050" opacity="0.2"/>
    <ellipse cx="1200" cy="2600" rx="1180" ry="25" fill="#a88040" opacity="0.15"/>
    <ellipse cx="1200" cy="2350" rx="1100" ry="15" fill="#c8a060" opacity="0.18"/>
    <ellipse cx="1200" cy="2700" rx="1190" ry="22" fill="#b89050" opacity="0.15"/>
    <ellipse cx="1200" cy="2200" rx="1050" ry="18" fill="#a88040" opacity="0.12"/>
    
    <!-- RINGS - dramatic sweep across the frame -->
    <!-- Ring system - multiple bands with gaps -->
    
    <!-- C ring - innermost, faint -->
    <ellipse cx="1200" cy="1800" rx="1500" ry="120" fill="none" stroke="#806030" stroke-width="25" opacity="0.15" filter="url(#ringGlow)"/>
    
    <!-- B ring - brightest -->
    <ellipse cx="1200" cy="1800" rx="1650" ry="132" fill="none" stroke="#c8a060" stroke-width="40" opacity="0.35" filter="url(#ringGlow)"/>
    <ellipse cx="1200" cy="1800" rx="1650" ry="132" fill="none" stroke="#d8b070" stroke-width="8" opacity="0.45"/>
    
    <!-- Cassini Division - gap -->
    <ellipse cx="1200" cy="1800" rx="1720" ry="138" fill="none" stroke="#06080c" stroke-width="8" opacity="0.6"/>
    
    <!-- A ring -->
    <ellipse cx="1200" cy="1800" rx="1800" ry="144" fill="none" stroke="#b89050" stroke-width="35" opacity="0.3" filter="url(#ringGlow)"/>
    <ellipse cx="1200" cy="1800" rx="1800" ry="144" fill="none" stroke="#c8a060" stroke-width="6" opacity="0.4"/>
    
    <!-- Encke Gap -->
    <ellipse cx="1200" cy="1800" rx="1850" ry="148" fill="none" stroke="#06080c" stroke-width="4" opacity="0.5"/>
    
    <!-- F ring - outermost, thin -->
    <ellipse cx="1200" cy="1800" rx="1920" ry="154" fill="none" stroke="#a08040" stroke-width="4" opacity="0.3"/>
    <ellipse cx="1200" cy="1800" rx="1925" ry="154" fill="none" stroke="#c0a050" stroke-width="2" opacity="0.35"/>
    
    <!-- Ring shadow on planet -->
    <ellipse cx="1200" cy="2250" rx="1100" ry="30" fill="#06080c" opacity="0.3"/>
  </g>
  
  <rect width="2400" height="3200" filter="url(#grain)" opacity="0.12"/>
</svg>