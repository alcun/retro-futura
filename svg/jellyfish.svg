<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 3200" width="2400" height="3200">
  <defs>
    <filter id="painted" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="turbulence" baseFrequency="0.01" numOctaves="3" seed="510" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="jellyGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
    <radialGradient id="bodyGlow" cx="50%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#c060a0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#081020" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <rect width="2400" height="3200" fill="#060818"/>
  <rect width="2400" height="3200" fill="url(#bodyGlow)"/>
  
  <g filter="url(#painted)">
    <!-- Bell/dome - the body -->
    <!-- Outer glow -->
    <path d="M 900 1200 C 900 900 1050 750 1200 720 C 1350 750 1500 900 1500 1200 C 1450 1280 1350 1320 1200 1330 C 1050 1320 950 1280 900 1200 Z" 
          fill="#a04880" opacity="0.06" filter="url(#jellyGlow)"/>
    
    <!-- Bell body -->
    <path d="M 950 1200 C 950 940 1060 800 1200 770 C 1340 800 1450 940 1450 1200 C 1400 1270 1320 1300 1200 1310 C 1080 1300 1000 1270 950 1200 Z" 
          fill="#c868a0" opacity="0.15"/>
    
    <!-- Inner bell highlight -->
    <path d="M 1020 1180 C 1020 990 1090 870 1200 840 C 1310 870 1380 990 1380 1180 C 1340 1230 1280 1250 1200 1255 C 1120 1250 1060 1230 1020 1180 Z" 
          fill="#d878b0" opacity="0.12"/>
    
    <!-- Bright centre dome -->
    <path d="M 1100 1140 C 1100 1020 1140 930 1200 910 C 1260 930 1300 1020 1300 1140 C 1270 1170 1240 1185 1200 1188 C 1160 1185 1130 1170 1100 1140 Z" 
          fill="#e890c0" opacity="0.1"/>
    
    <!-- Bell edge - brighter rim -->
    <path d="M 950 1200 C 950 1200 1000 1270 1200 1310 C 1400 1270 1450 1200 1450 1200" 
          fill="none" stroke="#d070a0" stroke-width="4" opacity="0.35"/>
    <path d="M 950 1200 C 950 1200 1000 1270 1200 1310 C 1400 1270 1450 1200 1450 1200" 
          fill="none" stroke="#e088b0" stroke-width="2" opacity="0.5"/>
    
    <!-- Oral arms - shorter, thicker tendrils from centre bottom of bell -->
    <path d="M 1150 1310 C 1140 1450 1120 1580 1100 1700 C 1080 1820 1090 1920 1110 2000" 
          stroke="#c868a0" stroke-width="6" fill="none" opacity="0.3" stroke-linecap="round"/>
    <path d="M 1200 1320 C 1200 1460 1210 1600 1200 1730 C 1190 1860 1180 1960 1190 2050" 
          stroke="#d070a8" stroke-width="7" fill="none" opacity="0.35" stroke-linecap="round"/>
    <path d="M 1250 1310 C 1260 1450 1280 1580 1300 1700 C 1320 1820 1310 1920 1290 2000" 
          stroke="#c868a0" stroke-width="6" fill="none" opacity="0.3" stroke-linecap="round"/>
    
    <!-- Long trailing tentacles - flowing downward, getting thinner -->
    <path d="M 970 1220 C 940 1500 900 1800 860 2100 C 830 2350 850 2550 880 2800" 
          stroke="#b05888" stroke-width="3.5" fill="none" opacity="0.25" stroke-linecap="round"/>
    <path d="M 1000 1250 C 980 1550 1020 1850 990 2150 C 960 2400 940 2600 960 2850" 
          stroke="#a05080" stroke-width="3" fill="none" opacity="0.22" stroke-linecap="round"/>
    <path d="M 1060 1280 C 1040 1560 1000 1840 1020 2120 C 1040 2380 1060 2620 1050 2900" 
          stroke="#b85890" stroke-width="2.5" fill="none" opacity="0.2" stroke-linecap="round"/>
    
    <path d="M 1340 1280 C 1360 1560 1400 1840 1380 2120 C 1360 2380 1340 2620 1350 2900" 
          stroke="#b85890" stroke-width="2.5" fill="none" opacity="0.2" stroke-linecap="round"/>
    <path d="M 1400 1250 C 1420 1550 1380 1850 1410 2150 C 1440 2400 1460 2600 1440 2850" 
          stroke="#a05080" stroke-width="3" fill="none" opacity="0.22" stroke-linecap="round"/>
    <path d="M 1430 1220 C 1460 1500 1500 1800 1540 2100 C 1570 2350 1550 2550 1520 2800" 
          stroke="#b05888" stroke-width="3.5" fill="none" opacity="0.25" stroke-linecap="round"/>
    
    <!-- Wispy outer tentacles -->
    <path d="M 940 1210 C 900 1450 840 1700 800 1950 C 770 2150 790 2350 810 2600" 
          stroke="#904870" stroke-width="2" fill="none" opacity="0.15" stroke-linecap="round"/>
    <path d="M 1460 1210 C 1500 1450 1560 1700 1600 1950 C 1630 2150 1610 2350 1590 2600" 
          stroke="#904870" stroke-width="2" fill="none" opacity="0.15" stroke-linecap="round"/>
    
    <!-- Glowing dots along tentacles -->
    <circle cx="860" cy="2100" r="4" fill="#d080b0" opacity="0.15" filter="url(#jellyGlow)"/>
    <circle cx="990" cy="2150" r="3.5" fill="#d080b0" opacity="0.12" filter="url(#jellyGlow)"/>
    <circle cx="1540" cy="2100" r="4" fill="#d080b0" opacity="0.15" filter="url(#jellyGlow)"/>
    <circle cx="1410" cy="2150" r="3.5" fill="#d080b0" opacity="0.12" filter="url(#jellyGlow)"/>
    <circle cx="880" cy="2500" r="3" fill="#c070a0" opacity="0.1" filter="url(#jellyGlow)"/>
    <circle cx="1520" cy="2500" r="3" fill="#c070a0" opacity="0.1" filter="url(#jellyGlow)"/>
  </g>
  
  <!-- Particles in water -->
  <circle cx="400" cy="500" r="2" fill="#506080" opacity="0.2"/>
  <circle cx="1800" cy="300" r="1.5" fill="#506080" opacity="0.15"/>
  <circle cx="600" cy="1500" r="2" fill="#506080" opacity="0.18"/>
  <circle cx="2000" cy="1200" r="1.5" fill="#506080" opacity="0.15"/>
  <circle cx="300" cy="2400" r="2" fill="#506080" opacity="0.18"/>
  <circle cx="1900" cy="2600" r="1.5" fill="#506080" opacity="0.15"/>
  <circle cx="500" cy="2900" r="2" fill="#506080" opacity="0.2"/>
  <circle cx="2100" cy="800" r="1.5" fill="#506080" opacity="0.12"/>
  <circle cx="350" cy="1000" r="1.5" fill="#506080" opacity="0.15"/>
  <circle cx="2200" cy="2000" r="2" fill="#506080" opacity="0.15"/>
  
  <rect width="2400" height="3200" filter="url(#grain)" opacity="0.12"/>
</svg>