<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 3200" width="2400" height="3200">
  <defs>
    <filter id="painted" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="turbulence" baseFrequency="0.015" numOctaves="3" seed="350" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="moonGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.05"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
    <radialGradient id="moonFace" cx="45%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#f0ece0"/>
      <stop offset="50%" stop-color="#e0d8c8"/>
      <stop offset="100%" stop-color="#c8c0b0"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="42%" r="40%">
      <stop offset="0%" stop-color="#c0b8a8" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#808070" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#1a1828" stop-opacity="0"/>
    </radialGradient>
  </defs>
  
  <rect width="2400" height="3200" fill="#0c0e18"/>
  <rect width="2400" height="3200" fill="url(#halo)"/>
  
  <g filter="url(#painted)">
    <!-- Moon glow -->
    <circle cx="1200" cy="1350" r="550" fill="#a0988a" opacity="0.04" filter="url(#moonGlow)"/>
    <circle cx="1200" cy="1350" r="480" fill="#b0a898" opacity="0.05" filter="url(#moonGlow)"/>
    
    <!-- Moon body -->
    <circle cx="1200" cy="1350" r="420" fill="url(#moonFace)"/>
    
    <!-- Mare/dark patches - the "face" of the moon -->
    <ellipse cx="1100" cy="1200" rx="120" ry="100" fill="#b0a898" opacity="0.3"/>
    <ellipse cx="1300" cy="1250" rx="80" ry="90" fill="#b8b0a0" opacity="0.25"/>
    <ellipse cx="1150" cy="1400" rx="150" ry="80" fill="#b0a898" opacity="0.25"/>
    <ellipse cx="1050" cy="1300" rx="60" ry="70" fill="#a8a090" opacity="0.2"/>
    <ellipse cx="1320" cy="1450" rx="90" ry="60" fill="#b8b0a0" opacity="0.2"/>
    <ellipse cx="1250" cy="1150" rx="50" ry="45" fill="#a8a090" opacity="0.18"/>
    
    <!-- Subtle crater circles -->
    <circle cx="1350" cy="1180" r="25" fill="none" stroke="#a8a090" stroke-width="2" opacity="0.15"/>
    <circle cx="1050" cy="1500" r="30" fill="none" stroke="#a8a090" stroke-width="2" opacity="0.12"/>
    <circle cx="1300" cy="1550" r="20" fill="none" stroke="#a8a090" stroke-width="1.5" opacity="0.12"/>
    <circle cx="1400" cy="1350" r="18" fill="none" stroke="#a8a090" stroke-width="1.5" opacity="0.1"/>
    <circle cx="950" cy="1250" r="22" fill="none" stroke="#a8a090" stroke-width="1.5" opacity="0.12"/>
    <circle cx="1150" cy="1550" r="15" fill="none" stroke="#a8a090" stroke-width="1.5" opacity="0.1"/>
    
    <!-- Bright limb highlight -->
    <circle cx="1200" cy="1350" r="418" fill="none" stroke="#e8e0d0" stroke-width="3" opacity="0.15"/>
  </g>
  
  <!-- Stars -->
  <circle cx="250" cy="250" r="2.5" fill="#c0c8d8" opacity="0.55"/>
  <circle cx="600" cy="400" r="2" fill="#c0c8d8" opacity="0.4"/>
  <circle cx="1800" cy="300" r="2.5" fill="#c0c8d8" opacity="0.5"/>
  <circle cx="2200" cy="500" r="2" fill="#c0c8d8" opacity="0.4"/>
  <circle cx="400" cy="700" r="1.5" fill="#c0c8d8" opacity="0.35"/>
  <circle cx="2000" cy="650" r="2" fill="#c0c8d8" opacity="0.35"/>
  <circle cx="300" cy="2200" r="2.5" fill="#c0c8d8" opacity="0.5"/>
  <circle cx="700" cy="2400" r="2" fill="#c0c8d8" opacity="0.4"/>
  <circle cx="1700" cy="2300" r="2.5" fill="#c0c8d8" opacity="0.5"/>
  <circle cx="2100" cy="2100" r="2" fill="#c0c8d8" opacity="0.4"/>
  <circle cx="500" cy="2700" r="1.5" fill="#c0c8d8" opacity="0.35"/>
  <circle cx="1900" cy="2600" r="2" fill="#c0c8d8" opacity="0.35"/>
  <circle cx="1200" cy="2800" r="2.5" fill="#c0c8d8" opacity="0.45"/>
  <circle cx="100" cy="1500" r="1.5" fill="#c0c8d8" opacity="0.3"/>
  <circle cx="2300" cy="1200" r="2" fill="#c0c8d8" opacity="0.35"/>
  <circle cx="150" cy="3000" r="2" fill="#c0c8d8" opacity="0.4"/>
  <circle cx="2200" cy="2800" r="1.5" fill="#c0c8d8" opacity="0.3"/>
  
  <rect width="2400" height="3200" filter="url(#grain)" opacity="0.15"/>
</svg>