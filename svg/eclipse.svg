<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 3200" width="2400" height="3200">
  <defs>
    <filter id="painted" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="turbulence" baseFrequency="0.012" numOctaves="3" seed="44" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.05"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
    <radialGradient id="coronaGlow" cx="50%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#f0d080" stop-opacity="0.25"/>
      <stop offset="30%" stop-color="#d0a050" stop-opacity="0.1"/>
      <stop offset="60%" stop-color="#4a2040" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0a0010" stop-opacity="0"/>
    </radialGradient>
    <filter id="coronaBlur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  
  <!-- Deep space - very dark purple/black -->
  <rect width="2400" height="3200" fill="#08000e"/>
  
  <!-- Corona glow -->
  <rect width="2400" height="3200" fill="url(#coronaGlow)"/>
  
  <!-- Stars -->
