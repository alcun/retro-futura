<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 3200" width="2400" height="3200">
  <defs>
    <filter id="painted" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.012" numOctaves="3" seed="220" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.05"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
    <linearGradient id="mtSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1828"/>
      <stop offset="100%" stop-color="#182838"/>
    </linearGradient>
  </defs>
  
  <rect width="2400" height="3200" fill="url(#mtSky)"/>
  
  <g filter="url(#painted)">
    <!-- Each layer is genuinely jagged - sharp peaks, steep drops, no smooth curves -->
    
    <!-- Layer 1 - far, faint, small peaks -->
    <path d="M -100 1300 L 80 1180 L 180 1250 L 320 1100 L 420 1200 L 520 1050 L 650 1170 L 780 980 L 880 1120 L 1000 1000 L 1100 1150 L 1250 950 L 1380 1100 L 1480 1020 L 1600 1150 L 1720 980 L 1850 1100 L 1950 1030 L 2100 1180 L 2220 1050 L 2350 1150 L 2500 1080" 
          fill="none" stroke="#4a5868" stroke-width="4" opacity="0.2" stroke-linejoin="bevel"/>
    
    <!-- Layer 2 - taller peaks emerging -->
    <path d="M -100 1500 L 50 1350 L 200 1450 L 350 1200 L 480 1380 L 600 1150 L 720 1350 L 850 1100 L 960 1300 L 1100 1080 L 1200 1280 L 1350 1050 L 1500 1250 L 1620 1120 L 1750 1300 L 1900 1080 L 2020 1280 L 2150 1150 L 2300 1320 L 2500 1180" 
          fill="none" stroke="#556878" stroke-width="5" opacity="0.25" stroke-linejoin="bevel"/>
    
    <!-- Layer 3 -->
    <path d="M -100 1700 L 100 1500 L 250 1620 L 400 1350 L 550 1550 L 700 1280 L 830 1500 L 1000 1200 L 1120 1450 L 1280 1180 L 1400 1420 L 1550 1150 L 1700 1400 L 1830 1220 L 1980 1450 L 2120 1200 L 2260 1420 L 2400 1280 L 2500 1350" 
          fill="none" stroke="#607888" stroke-width="6" opacity="0.3" stroke-linejoin="bevel"/>
    
    <!-- Layer 4 - big dramatic peaks -->
    <path d="M -100 1900 L 80 1700 L 220 1800 L 380 1450 L 520 1700 L 680 1380 L 800 1650 L 980 1300 L 1100 1600 L 1280 1280 L 1420 1580 L 1560 1300 L 1720 1600 L 1860 1350 L 2020 1650 L 2180 1350 L 2300 1580 L 2500 1450" 
          fill="none" stroke="#6b8898" stroke-width="7" opacity="0.35" stroke-linejoin="bevel"/>
    
    <!-- Layer 5 -->
    <path d="M -100 2100 L 120 1880 L 280 2000 L 450 1600 L 600 1880 L 760 1500 L 900 1800 L 1080 1450 L 1220 1780 L 1380 1420 L 1520 1750 L 1680 1400 L 1840 1750 L 1980 1500 L 2140 1800 L 2300 1480 L 2500 1700" 
          fill="none" stroke="#7898a8" stroke-width="8" opacity="0.4" stroke-linejoin="bevel"/>
    
    <!-- Layer 6 -->
    <path d="M -100 2300 L 100 2050 L 280 2200 L 440 1750 L 600 2050 L 780 1650 L 920 1980 L 1100 1580 L 1260 1950 L 1400 1600 L 1560 1920 L 1740 1550 L 1880 1900 L 2060 1620 L 2200 1950 L 2380 1600 L 2500 1850" 
          fill="none" stroke="#88a8b8" stroke-width="9" opacity="0.45" stroke-linejoin="bevel"/>
    
    <!-- Layer 7 -->
    <path d="M -100 2500 L 80 2250 L 260 2400 L 420 1900 L 580 2220 L 760 1800 L 920 2150 L 1100 1740 L 1260 2120 L 1420 1780 L 1580 2100 L 1760 1720 L 1920 2080 L 2100 1760 L 2260 2120 L 2420 1780 L 2500 2000" 
          fill="none" stroke="#98b8c8" stroke-width="9.5" opacity="0.5" stroke-linejoin="bevel"/>
    
    <!-- Layer 8 - near, bright, huge peaks -->
    <path d="M -100 2700 L 120 2400 L 300 2600 L 460 2050 L 640 2400 L 800 1950 L 980 2350 L 1150 1900 L 1320 2300 L 1500 1920 L 1660 2280 L 1840 1880 L 2000 2260 L 2180 1920 L 2340 2300 L 2500 2050" 
          fill="none" stroke="#a8c8d8" stroke-width="10" opacity="0.55" stroke-linejoin="bevel"/>
    
    <!-- Layer 9 - nearest -->
    <path d="M -100 2900 L 100 2600 L 300 2800 L 480 2200 L 660 2580 L 840 2100 L 1020 2520 L 1200 2050 L 1400 2500 L 1580 2080 L 1760 2480 L 1940 2050 L 2120 2450 L 2300 2100 L 2500 2400" 
          fill="none" stroke="#b8d0e0" stroke-width="10" opacity="0.55" stroke-linejoin="bevel"/>
    
    <!-- Foreground ridge -->
    <path d="M -100 3100 L 150 2800 L 350 3000 L 550 2500 L 750 2800 L 950 2400 L 1150 2750 L 1350 2350 L 1550 2700 L 1750 2350 L 1950 2700 L 2150 2400 L 2350 2750 L 2500 2550" 
          fill="none" stroke="#c8d8e8" stroke-width="9" opacity="0.5" stroke-linejoin="bevel"/>
  </g>
  
  <!-- Stars -->
  <circle cx="300" cy="200" r="2.5" fill="#c8d8f0" opacity="0.55"/>
  <circle cx="800" cy="150" r="2" fill="#c8d8f0" opacity="0.45"/>
  <circle cx="1200" cy="250" r="3" fill="#c8d8f0" opacity="0.6"/>
  <circle cx="1700" cy="180" r="2" fill="#c8d8f0" opacity="0.45"/>
  <circle cx="2100" cy="300" r="2.5" fill="#c8d8f0" opacity="0.5"/>
  <circle cx="500" cy="400" r="1.5" fill="#c8d8f0" opacity="0.35"/>
  <circle cx="1500" cy="350" r="2" fill="#c8d8f0" opacity="0.3"/>
  <circle cx="2000" cy="500" r="1.5" fill="#c8d8f0" opacity="0.3"/>
  <circle cx="400" cy="650" r="2" fill="#c8d8f0" opacity="0.25"/>
  <circle cx="1900" cy="600" r="1.5" fill="#c8d8f0" opacity="0.25"/>
  
  <rect width="2400" height="3200" filter="url(#grain)" opacity="0.15"/>
</svg>