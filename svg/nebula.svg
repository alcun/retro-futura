<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 3200" width="2400" height="3200">
  <defs>
    <filter id="nebula1" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="5" seed="42" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="80" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="nebula2" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.006" numOctaves="4" seed="77" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="60" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="25"/>
    </filter>
    <filter id="nebula3" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.01" numOctaves="4" seed="33" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="50" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
  </defs>
  
  <!-- Deep space -->
  <rect width="2400" height="3200" fill="#060010"/>
  
  <!-- Nebula clouds - layered organic shapes with displacement -->
  <!-- Deep purple base layer -->
  <ellipse cx="1100" cy="1400" rx="900" ry="700" fill="#2a1040" opacity="0.7" filter="url(#nebula1)"/>
  <ellipse cx="1400" cy="1800" rx="700" ry="600" fill="#1a0830" opacity="0.6" filter="url(#nebula1)"/>
  
  <!-- Teal/cyan wisps -->
  <ellipse cx="800" cy="1200" rx="500" ry="400" fill="#0a4050" opacity="0.5" filter="url(#nebula2)"/>
  <ellipse cx="1600" cy="1600" rx="450" ry="350" fill="#084048" opacity="0.45" filter="url(#nebula2)"/>
  <ellipse cx="1000" cy="2000" rx="550" ry="300" fill="#0a3848" opacity="0.4" filter="url(#nebula2)"/>
  
  <!-- Hot pink/magenta highlights -->
  <ellipse cx="1200" cy="1300" rx="350" ry="250" fill="#601848" opacity="0.5" filter="url(#nebula3)"/>
  <ellipse cx="900" cy="1600" rx="300" ry="200" fill="#582050" opacity="0.45" filter="url(#nebula3)"/>
  <ellipse cx="1500" cy="1400" rx="280" ry="220" fill="#501840" opacity="0.4" filter="url(#nebula3)"/>
  
  <!-- Bright core -->
  <ellipse cx="1150" cy="1450" rx="200" ry="150" fill="#884868" opacity="0.35" filter="url(#nebula3)"/>
  <ellipse cx="1150" cy="1450" rx="100" ry="80" fill="#a06080" opacity="0.25" filter="url(#nebula3)"/>
  
  <!-- Star field - varied sizes and brightness -->
  <g filter="url(#starGlow)">
    <!-- Bright stars -->
    <circle cx="400" cy="300" r="3.5" fill="#e8e0ff" opacity="0.85"/>
    <circle cx="1800" cy="500" r="3" fill="#ffe8e0" opacity="0.8"/>
    <circle cx="700" cy="800" r="3.5" fill="#e0f0ff" opacity="0.75"/>
    <circle cx="2000" cy="1000" r="3" fill="#e8e0ff" opacity="0.7"/>
    <circle cx="300" cy="1500" r="3.5" fill="#ffe8f0" opacity="0.75"/>
    <circle cx="2100" cy="1800" r="3" fill="#e0f0ff" opacity="0.7"/>
    <circle cx="500" cy="2500" r="3.5" fill="#e8e0ff" opacity="0.8"/>
    <circle cx="1900" cy="2700" r="3" fill="#ffe8e0" opacity="0.75"/>
  </g>
  <!-- Dim stars -->
  <circle cx="200" cy="150" r="1.5" fill="#c0b8d0" opacity="0.5"/>
  <circle cx="550" cy="250" r="2" fill="#c0b8d0" opacity="0.45"/>
  <circle cx="1000" cy="180" r="1.5" fill="#c0b8d0" opacity="0.4"/>
  <circle cx="1500" cy="300" r="2" fill="#c0b8d0" opacity="0.5"/>
  <circle cx="2200" cy="200" r="1.5" fill="#c0b8d0" opacity="0.45"/>
  <circle cx="150" cy="700" r="2" fill="#c0b8d0" opacity="0.4"/>
  <circle cx="2300" cy="650" r="1.5" fill="#c0b8d0" opacity="0.35"/>
  <circle cx="450" cy="1100" r="2" fill="#c0b8d0" opacity="0.4"/>
  <circle cx="1950" cy="1300" r="1.5" fill="#c0b8d0" opacity="0.45"/>
  <circle cx="250" cy="2000" r="2" fill="#c0b8d0" opacity="0.4"/>
  <circle cx="2150" cy="2200" r="1.5" fill="#c0b8d0" opacity="0.35"/>
  <circle cx="700" cy="2800" r="2" fill="#c0b8d0" opacity="0.45"/>
  <circle cx="1300" cy="2900" r="1.5" fill="#c0b8d0" opacity="0.4"/>
  <circle cx="2000" cy="3000" r="2" fill="#c0b8d0" opacity="0.5"/>
  <circle cx="350" cy="3050" r="1.5" fill="#c0b8d0" opacity="0.35"/>
  <circle cx="1100" cy="600" r="1.5" fill="#c0b8d0" opacity="0.4"/>
  <circle cx="1700" cy="900" r="2" fill="#c0b8d0" opacity="0.45"/>
  <circle cx="600" cy="1800" r="1.5" fill="#c0b8d0" opacity="0.35"/>
  <circle cx="1400" cy="2100" r="2" fill="#c0b8d0" opacity="0.4"/>
  <circle cx="850" cy="2400" r="1.5" fill="#c0b8d0" opacity="0.45"/>
  <circle cx="1600" cy="2600" r="2" fill="#c0b8d0" opacity="0.4"/>
  
  <rect width="2400" height="3200" filter="url(#grain)" opacity="0.12"/>
</svg>