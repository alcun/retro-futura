<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 3200" width="2400" height="3200">
  <defs>
    <filter id="painted" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.012" numOctaves="3" seed="310" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.06"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
  </defs>
  
  <!-- Warm sand/rock background -->
  <rect width="2400" height="3200" fill="#d8c8a8"/>
  
  <g filter="url(#painted)">
    <!-- Pool 1 - large, upper area -->
    <!-- Irregular rock edge -->
    <path d="M 400 500 Q 500 400 700 420 Q 900 380 1050 450 Q 1200 520 1150 700 Q 1100 880 950 950 Q 750 1020 550 970 Q 380 900 350 720 Q 330 580 400 500 Z" 
          fill="#4888a0" opacity="0.35" stroke="#907858" stroke-width="6" stroke-opacity="0.4"/>
    <!-- Ripples inside -->
    <ellipse cx="750" cy="680" rx="280" ry="200" fill="none" stroke="#5898b0" stroke-width="3" opacity="0.3"/>
    <ellipse cx="750" cy="680" rx="210" ry="150" fill="none" stroke="#60a0b8" stroke-width="2.5" opacity="0.35"/>
    <ellipse cx="750" cy="680" rx="140" ry="100" fill="none" stroke="#68a8c0" stroke-width="2" opacity="0.4"/>
    <ellipse cx="750" cy="680" rx="70" ry="50" fill="none" stroke="#70b0c8" stroke-width="1.5" opacity="0.45"/>
    
    <!-- Pool 2 - medium, right side -->
    <path d="M 1400 800 Q 1550 750 1700 800 Q 1850 870 1880 1050 Q 1870 1230 1720 1300 Q 1550 1350 1400 1280 Q 1300 1180 1310 1020 Q 1320 860 1400 800 Z" 
          fill="#408098" opacity="0.35" stroke="#907858" stroke-width="5.5" stroke-opacity="0.4"/>
    <ellipse cx="1590" cy="1050" rx="200" ry="180" fill="none" stroke="#5090a8" stroke-width="3" opacity="0.3"/>
    <ellipse cx="1590" cy="1050" rx="140" ry="125" fill="none" stroke="#5898b0" stroke-width="2.5" opacity="0.35"/>
    <ellipse cx="1590" cy="1050" rx="80" ry="70" fill="none" stroke="#60a0b8" stroke-width="2" opacity="0.4"/>
    
    <!-- Pool 3 - large, center -->
    <path d="M 500 1400 Q 650 1300 900 1320 Q 1150 1350 1300 1450 Q 1400 1580 1380 1780 Q 1330 1980 1100 2060 Q 850 2100 630 2020 Q 430 1920 400 1720 Q 380 1540 500 1400 Z" 
          fill="#4888a0" opacity="0.4" stroke="#907858" stroke-width="7" stroke-opacity="0.45"/>
    <ellipse cx="880" cy="1700" rx="350" ry="270" fill="none" stroke="#5090a8" stroke-width="3.5" opacity="0.28"/>
    <ellipse cx="880" cy="1700" rx="270" ry="210" fill="none" stroke="#5898b0" stroke-width="3" opacity="0.32"/>
    <ellipse cx="880" cy="1700" rx="190" ry="150" fill="none" stroke="#60a0b8" stroke-width="2.5" opacity="0.36"/>
    <ellipse cx="880" cy="1700" rx="120" ry="95" fill="none" stroke="#68a8c0" stroke-width="2" opacity="0.4"/>
    <ellipse cx="880" cy="1700" rx="55" ry="45" fill="none" stroke="#70b0c8" stroke-width="1.5" opacity="0.45"/>
    
    <!-- Pool 4 - small, right -->
    <path d="M 1600 1700 Q 1720 1650 1850 1700 Q 1950 1780 1940 1920 Q 1900 2050 1770 2080 Q 1630 2080 1560 1970 Q 1520 1850 1600 1700 Z" 
          fill="#408098" opacity="0.35" stroke="#907858" stroke-width="5" stroke-opacity="0.4"/>
    <ellipse cx="1740" cy="1870" rx="130" ry="120" fill="none" stroke="#5898b0" stroke-width="2.5" opacity="0.32"/>
    <ellipse cx="1740" cy="1870" rx="70" ry="65" fill="none" stroke="#60a0b8" stroke-width="2" opacity="0.38"/>
    
    <!-- Pool 5 - lower area -->
    <path d="M 300 2300 Q 450 2200 700 2240 Q 950 2280 1050 2400 Q 1100 2560 1020 2700 Q 880 2820 650 2830 Q 400 2800 300 2650 Q 240 2500 300 2300 Z" 
          fill="#4888a0" opacity="0.38" stroke="#907858" stroke-width="6" stroke-opacity="0.42"/>
    <ellipse cx="660" cy="2520" rx="280" ry="220" fill="none" stroke="#5090a8" stroke-width="3" opacity="0.28"/>
    <ellipse cx="660" cy="2520" rx="200" ry="160" fill="none" stroke="#5898b0" stroke-width="2.5" opacity="0.33"/>
    <ellipse cx="660" cy="2520" rx="130" ry="105" fill="none" stroke="#60a0b8" stroke-width="2" opacity="0.38"/>
    <ellipse cx="660" cy="2520" rx="60" ry="48" fill="none" stroke="#68a8c0" stroke-width="1.5" opacity="0.42"/>
    
    <!-- Pool 6 - small, lower right -->
    <path d="M 1500 2500 Q 1620 2450 1750 2500 Q 1850 2580 1830 2720 Q 1780 2840 1650 2860 Q 1520 2850 1460 2740 Q 1430 2620 1500 2500 Z" 
          fill="#408098" opacity="0.32" stroke="#907858" stroke-width="5" stroke-opacity="0.38"/>
    <ellipse cx="1640" cy="2670" rx="130" ry="120" fill="none" stroke="#5898b0" stroke-width="2.5" opacity="0.3"/>
    <ellipse cx="1640" cy="2670" rx="65" ry="60" fill="none" stroke="#60a0b8" stroke-width="2" opacity="0.35"/>
    
    <!-- Rock texture - scattered small marks between pools -->
    <circle cx="1200" cy="450" r="3" fill="#a08860" opacity="0.2"/>
    <circle cx="300" cy="1200" r="4" fill="#a08860" opacity="0.18"/>
    <circle cx="1900" cy="1450" r="3.5" fill="#a08860" opacity="0.2"/>
    <circle cx="1300" cy="2200" r="3" fill="#a08860" opacity="0.18"/>
    <circle cx="2000" cy="2300" r="4" fill="#a08860" opacity="0.15"/>
    <circle cx="200" cy="2100" r="3.5" fill="#a08860" opacity="0.18"/>
    <circle cx="1100" cy="1200" r="3" fill="#a08860" opacity="0.2"/>
    <circle cx="2100" cy="900" r="3.5" fill="#a08860" opacity="0.15"/>
  </g>
  
  <rect width="2400" height="3200" filter="url(#grain)" opacity="0.22"/>
</svg>