<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 3200" width="2400" height="3200">
  <defs>
    <filter id="painted" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.015" numOctaves="3" seed="240" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="lavaGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.05"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
  </defs>
  
  <rect width="2400" height="3200" fill="#0c0404"/>
  
  <!-- Cracked earth pattern - irregular polygonal shapes -->
  <g filter="url(#painted)">
    <!-- Major cracks - bright lava showing through -->
    <!-- Vertical-ish cracks -->
    <path d="M 400 -50 L 380 200 L 420 450 L 390 700 L 430 1000 L 400 1300 L 440 1600 L 410 1900 L 450 2200 L 420 2500 L 440 2800 L 410 3050 L 430 3250" 
          stroke="#e06020" stroke-width="5" opacity="0.5" fill="none" stroke-linejoin="bevel" filter="url(#lavaGlow)"/>
    <path d="M 900 -50 L 920 300 L 880 550 L 910 850 L 870 1100 L 920 1400 L 880 1700 L 910 2000 L 870 2300 L 920 2600 L 890 2900 L 910 3250" 
          stroke="#d05018" stroke-width="4.5" opacity="0.45" fill="none" stroke-linejoin="bevel" filter="url(#lavaGlow)"/>
    <path d="M 1400 -50 L 1380 250 L 1420 500 L 1390 800 L 1430 1050 L 1400 1350 L 1380 1650 L 1420 1950 L 1390 2250 L 1430 2550 L 1400 2850 L 1420 3250" 
          stroke="#e86828" stroke-width="5.5" opacity="0.5" fill="none" stroke-linejoin="bevel" filter="url(#lavaGlow)"/>
    <path d="M 1950 -50 L 1930 200 L 1970 480 L 1940 750 L 1980 1050 L 1950 1350 L 1930 1650 L 1970 1950 L 1940 2250 L 1970 2550 L 1950 2850 L 1930 3250" 
          stroke="#d05820" stroke-width="4" opacity="0.42" fill="none" stroke-linejoin="bevel" filter="url(#lavaGlow)"/>
    
    <!-- Horizontal-ish cracks -->
    <path d="M -50 350 L 250 380 L 500 340 L 750 370 L 1000 330 L 1250 360 L 1500 320 L 1750 350 L 2000 310 L 2250 340 L 2450 320" 
          stroke="#c84818" stroke-width="4" opacity="0.4" fill="none" stroke-linejoin="bevel" filter="url(#lavaGlow)"/>
    <path d="M -50 800 L 200 830 L 450 790 L 700 820 L 950 780 L 1200 810 L 1450 770 L 1700 800 L 1950 760 L 2200 790 L 2450 770" 
          stroke="#d85020" stroke-width="4.5" opacity="0.42" fill="none" stroke-linejoin="bevel" filter="url(#lavaGlow)"/>
    <path d="M -50 1250 L 300 1280 L 550 1240 L 800 1270 L 1050 1230 L 1300 1260 L 1550 1220 L 1800 1250 L 2050 1210 L 2300 1240 L 2450 1220" 
          stroke="#e06028" stroke-width="5" opacity="0.45" fill="none" stroke-linejoin="bevel" filter="url(#lavaGlow)"/>
    <path d="M -50 1700 L 250 1730 L 500 1690 L 750 1720 L 1000 1680 L 1250 1710 L 1500 1670 L 1750 1700 L 2000 1660 L 2250 1690 L 2450 1670" 
          stroke="#c84818" stroke-width="4.5" opacity="0.42" fill="none" stroke-linejoin="bevel" filter="url(#lavaGlow)"/>
    <path d="M -50 2150 L 200 2180 L 450 2140 L 700 2170 L 950 2130 L 1200 2160 L 1450 2120 L 1700 2150 L 1950 2110 L 2200 2140 L 2450 2120" 
          stroke="#e86830" stroke-width="5.5" opacity="0.48" fill="none" stroke-linejoin="bevel" filter="url(#lavaGlow)"/>
    <path d="M -50 2600 L 300 2630 L 550 2590 L 800 2620 L 1050 2580 L 1300 2610 L 1550 2570 L 1800 2600 L 2050 2560 L 2300 2590 L 2450 2570" 
          stroke="#d05820" stroke-width="4.5" opacity="0.42" fill="none" stroke-linejoin="bevel" filter="url(#lavaGlow)"/>
    <path d="M -50 3050 L 250 3080 L 500 3040 L 750 3070 L 1000 3030 L 1250 3060 L 1500 3020 L 1750 3050 L 2000 3010 L 2250 3040 L 2450 3020" 
          stroke="#c84818" stroke-width="4" opacity="0.38" fill="none" stroke-linejoin="bevel" filter="url(#lavaGlow)"/>
    
    <!-- Diagonal fractures -->
    <path d="M 200 -50 L 500 400 L 300 800 L 600 1200 L 400 1600" 
          stroke="#b04010" stroke-width="3" opacity="0.3" fill="none" stroke-linejoin="bevel" filter="url(#lavaGlow)"/>
    <path d="M 1600 -50 L 1300 350 L 1550 750 L 1280 1150 L 1500 1500" 
          stroke="#b04010" stroke-width="3" opacity="0.3" fill="none" stroke-linejoin="bevel" filter="url(#lavaGlow)"/>
    <path d="M 800 1600 L 1100 2000 L 900 2400 L 1150 2800 L 1000 3250" 
          stroke="#b04010" stroke-width="3" opacity="0.3" fill="none" stroke-linejoin="bevel" filter="url(#lavaGlow)"/>
    <path d="M 2200 1500 L 1900 1900 L 2100 2300 L 1850 2700 L 2050 3250" 
          stroke="#b04010" stroke-width="3" opacity="0.3" fill="none" stroke-linejoin="bevel" filter="url(#lavaGlow)"/>
    
    <!-- Hot spots - brighter glowing nodes at intersections -->
    <circle cx="400" cy="350" r="8" fill="#f08030" opacity="0.35" filter="url(#lavaGlow)"/>
    <circle cx="900" cy="800" r="10" fill="#f09040" opacity="0.4" filter="url(#lavaGlow)"/>
    <circle cx="1400" cy="1250" r="9" fill="#f08030" opacity="0.35" filter="url(#lavaGlow)"/>
    <circle cx="400" cy="1700" r="8" fill="#e87028" opacity="0.3" filter="url(#lavaGlow)"/>
    <circle cx="1950" cy="800" r="7" fill="#f09040" opacity="0.32" filter="url(#lavaGlow)"/>
    <circle cx="900" cy="2150" r="10" fill="#f08030" opacity="0.38" filter="url(#lavaGlow)"/>
    <circle cx="1400" cy="2600" r="9" fill="#f09040" opacity="0.35" filter="url(#lavaGlow)"/>
    <circle cx="1950" cy="2150" r="8" fill="#e87028" opacity="0.32" filter="url(#lavaGlow)"/>
    <circle cx="400" cy="2600" r="7" fill="#f08030" opacity="0.3" filter="url(#lavaGlow)"/>
    <circle cx="1950" cy="3050" r="9" fill="#f09040" opacity="0.35" filter="url(#lavaGlow)"/>
  </g>
  
  <rect width="2400" height="3200" filter="url(#grain)" opacity="0.15"/>
</svg>