<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 3200" width="2400" height="3200">
  <defs>
    <filter id="painted" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.012" numOctaves="3" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.05"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
    <radialGradient id="coreFill" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#f5d465"/>
      <stop offset="50%" stop-color="#e8b840"/>
      <stop offset="100%" stop-color="#d4a030"/>
    </radialGradient>
  </defs>
  
  <rect width="2400" height="3200" fill="#f4ebda"/>
  
  <!-- Orbital rings - concentric, varied thickness -->
  <g filter="url(#painted)">
    <!-- Outermost rings -->
    <ellipse cx="1200" cy="1100" rx="950" ry="950" fill="none" stroke="#c89528" stroke-width="3.0" opacity="0.35"/>
    <ellipse cx="1200" cy="1100" rx="850" ry="850" fill="none" stroke="#d4a030" stroke-width="4.5" opacity="0.4"/>
    <ellipse cx="1200" cy="1100" rx="740" ry="740" fill="none" stroke="#c49025" stroke-width="3.2" opacity="0.35"/>
    <ellipse cx="1200" cy="1100" rx="640" ry="640" fill="none" stroke="#d9a835" stroke-width="5.0" opacity="0.45"/>
    <ellipse cx="1200" cy="1100" rx="540" ry="540" fill="none" stroke="#c89528" stroke-width="3.5" opacity="0.38"/>
    <ellipse cx="1200" cy="1100" rx="450" ry="450" fill="none" stroke="#d4a030" stroke-width="4.8" opacity="0.42"/>
    <ellipse cx="1200" cy="1100" rx="365" ry="365" fill="none" stroke="#c49025" stroke-width="3.0" opacity="0.35"/>
    <ellipse cx="1200" cy="1100" rx="290" ry="290" fill="none" stroke="#d9a835" stroke-width="5.5" opacity="0.48"/>
    <ellipse cx="1200" cy="1100" rx="225" ry="225" fill="none" stroke="#c89528" stroke-width="3.8" opacity="0.4"/>
    
    <!-- Central body -->
    <circle cx="1200" cy="1100" r="160" fill="#d4a030" opacity="0.15"/>
    <circle cx="1200" cy="1100" r="140" fill="url(#coreFill)"/>
    <circle cx="1190" cy="1080" r="85" fill="#ecc555" opacity="0.3"/>
    <circle cx="1185" cy="1070" r="45" fill="#f5da70" opacity="0.25"/>
    
    <!-- Orbiting bodies - small circles on the rings -->
    <circle cx="1200" cy="200" r="18" fill="#d9a835" opacity="0.65"/>
    <circle cx="560" cy="1100" r="12" fill="#c89528" opacity="0.55"/>
    <circle cx="1750" cy="540" r="22" fill="#d4a030" opacity="0.6"/>
    <circle cx="850" cy="1800" r="15" fill="#c49025" opacity="0.5"/>
    <circle cx="1650" cy="1550" r="10" fill="#d9a835" opacity="0.55"/>
  </g>
  
  <rect width="2400" height="3200" filter="url(#grain)" opacity="0.25"/>
</svg>