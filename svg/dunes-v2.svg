<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 3200" width="2400" height="3200">
  <defs>
    <filter id="painted" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="turbulence" baseFrequency="0.012" numOctaves="3" seed="230" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.06"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
    <linearGradient id="dSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8e0b0"/>
      <stop offset="100%" stop-color="#e8c890"/>
    </linearGradient>
  </defs>
  
  <rect width="2400" height="3200" fill="url(#dSky)"/>
  
  <g filter="url(#painted)">
    <!-- Dunes have long windward slopes and sharp lee sides - asymmetric -->
    <!-- Each dune is a long gentle rise then a sharper drop -->
    
    <!-- Layer 1 - far, faint -->
    <path d="M -100 950 C 200 950 500 900 800 800 C 900 770 920 780 950 850 C 1200 850 1500 800 1800 720 C 1900 700 1920 710 1940 780 C 2100 780 2300 750 2500 700"
          fill="none" stroke="#d8b078" stroke-width="5" opacity="0.25"/>
    
    <!-- Layer 2 -->
    <path d="M -100 1150 C 300 1150 700 1080 1000 950 C 1120 900 1150 920 1170 1000 C 1400 1000 1700 940 2000 850 C 2100 820 2130 840 2150 920 C 2300 920 2400 900 2500 880"
          fill="none" stroke="#d4a870" stroke-width="5.5" opacity="0.3"/>
    
    <!-- Layer 3 -->
    <path d="M -100 1380 C 100 1380 400 1320 700 1200 C 850 1140 880 1160 900 1250 C 1100 1250 1400 1180 1700 1080 C 1820 1030 1850 1050 1870 1140 C 2050 1140 2300 1080 2500 1030"
          fill="none" stroke="#d0a068" stroke-width="6.5" opacity="0.35"/>
    
    <!-- Layer 4 -->
    <path d="M -100 1600 C 200 1600 600 1500 900 1350 C 1050 1280 1080 1310 1100 1420 C 1350 1420 1650 1340 1900 1220 C 2020 1170 2050 1190 2070 1290 C 2200 1290 2400 1240 2500 1200"
          fill="none" stroke="#cc9860" stroke-width="7.5" opacity="0.4"/>
    
    <!-- Layer 5 -->
    <path d="M -100 1830 C 150 1830 500 1730 800 1560 C 960 1480 1000 1510 1020 1630 C 1250 1630 1550 1540 1850 1390 C 1980 1330 2010 1360 2030 1470 C 2200 1470 2400 1410 2500 1370"
          fill="none" stroke="#c89058" stroke-width="8.5" opacity="0.45"/>
    
    <!-- Layer 6 -->
    <path d="M -100 2060 C 250 2060 600 1940 900 1740 C 1080 1640 1120 1680 1140 1820 C 1380 1820 1700 1700 1950 1550 C 2080 1480 2110 1510 2130 1640 C 2300 1640 2450 1580 2500 1550"
          fill="none" stroke="#c48850" stroke-width="9" opacity="0.5"/>
    
    <!-- Layer 7 -->
    <path d="M -100 2290 C 200 2290 550 2150 850 1920 C 1020 1810 1060 1850 1080 2010 C 1300 2010 1600 1880 1900 1700 C 2050 1620 2080 1660 2100 1800 C 2280 1800 2450 1730 2500 1700"
          fill="none" stroke="#c08048" stroke-width="9.5" opacity="0.55"/>
    
    <!-- Layer 8 -->
    <path d="M -100 2520 C 150 2520 500 2370 800 2110 C 970 1990 1010 2030 1030 2200 C 1280 2200 1580 2050 1850 1860 C 2000 1770 2040 1810 2060 1970 C 2250 1970 2440 1890 2500 1860"
          fill="none" stroke="#b87840" stroke-width="10" opacity="0.58"/>
    
    <!-- Layer 9 -->
    <path d="M -100 2750 C 250 2750 600 2570 900 2290 C 1080 2150 1120 2200 1140 2390 C 1380 2390 1700 2210 1950 2010 C 2100 1910 2140 1950 2160 2130 C 2320 2130 2460 2050 2500 2020"
          fill="none" stroke="#b07038" stroke-width="10.5" opacity="0.6"/>
    
    <!-- Layer 10 - nearest -->
    <path d="M -100 2980 C 200 2980 550 2780 850 2470 C 1040 2310 1080 2360 1100 2570 C 1350 2570 1650 2380 1900 2160 C 2060 2050 2100 2100 2120 2300 C 2300 2300 2470 2200 2500 2170"
          fill="none" stroke="#a86830" stroke-width="10" opacity="0.58"/>
    
    <!-- Layer 11 -->
    <path d="M -100 3200 C 300 3200 650 2980 950 2650 C 1130 2480 1170 2540 1190 2750 C 1420 2750 1720 2540 1980 2310 C 2140 2190 2180 2240 2200 2450 C 2350 2450 2480 2360 2500 2330"
          fill="none" stroke="#a06028" stroke-width="9.5" opacity="0.52"/>
  </g>
  
  <rect width="2400" height="3200" filter="url(#grain)" opacity="0.22"/>
</svg>